{{ define "main" }}
  {{ with .Site.Params.description }}<p class="intro">{{ . }}</p>{{ end }}
  <ul class="post-list">
    {{ range (where .Site.RegularPages "Section" "posts") }}
      <li>
        <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
{{ end }}
