{{ define "main" }}
  <article class="post">
    <h1>{{ .Title }}</h1>
    <p class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ if gt .ReadingTime 0 }} · {{ .ReadingTime }} min read{{ end }}
    </p>
    {{ .Content }}
  </article>
{{ end }}
